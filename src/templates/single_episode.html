<div class="audio-podcastsCards swiper-slide equal_heightSwiper" style="width: 30%;">
	<div class="card-podcast" style = "aspect-ratio: 0 !important; width: auto !important; margin-right : 0 !important;">
		<div class="single_serie">
			
			<a onclick="window.OMA_DATA.player.playPodcast('{{item.Audio|default(value="")}}')">
				{% if item.Photo %}
					<img src="{{data.oma.args.soundbase_prefix}}/webpL/{{item.Photo}}.webpL"/>
				{% elif data.config.Logo %}
					<img src="{{data.oma.args.soundbase_prefix}}/webpL/{{data.config.Logo}}.webpL" alt="Logo de la radio" />
				{% else %}
					<img src="{{data.oma.args.website_prefix}}/img/earth.svg" alt="image par défaut"/>
				{% endif %}
			</a>


			<header>
				<h4 title="{{item | get(key="Titre", default="") }}">{{item | get(key="Titre", default="") }}</h4>
				<p>
					{% if item.Date %}
						<i>Le {{ item.Date | date_to_ts }}</i><br />
					{% endif %}
					<span class="ellipsis">Dans <a onclick="return internalNavigation(event)" href="{{data.oma.args.website_prefix}}/serie/{{serie_fic._filename}}.html">{{serie_fic.Titre}}</a></span>
				</p>
			</header>
			{% if item.Audio %}
				<audio controls="controls" class="tohide" preload="none">
					<source src="{{data.oma.args.soundbase_prefix}}/ogg/{{item.Audio}}.ogg" />
				</audio>
			{% endif %}
						<div class="actions">
						<a class="toshow" onclick="window.OMA_DATA.player.playPodcast('{{item.Audio|default(value="")}}')">
							<img src="{{data.oma.args.website_prefix}}/img/play.svg" alt="Écouter"/>
						</a>
						{#
						<a href="">
							<img src="{{data.oma.args.website_prefix}}/img/rss.svg" alt="Flux RSS"/>
						</a>
						#}
						<a onclick="openShare(window.location.origin + '{{data.oma.args.website_prefix}}/episode/{{item._filename}}.html')">
							<img src="{{data.oma.args.website_prefix}}/img/share.svg" alt="Partager"/>
						</a>
						{% if item.Audio %}
							<a href="{{data.oma.args.soundbase_prefix}}/ogg/{{item.Audio}}.ogg" download="">
								<img src="{{data.oma.args.website_prefix}}/img/download.svg" alt="Télécharger"/>
							</a>
						{% endif %}
						<a onclick="return internalNavigation(event)" href="{{data.oma.args.website_prefix}}/episode/{{item._filename}}.html">
							<img src="{{data.oma.args.website_prefix}}/img/plus.svg" />
				</a>
			</div>
			
		</div>
	</div>
</div>
